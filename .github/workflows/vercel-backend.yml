name: Vercel Backend Deploy

on:
  push:
    branches:
      - main

jobs:
  integration_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check backend health
        run: |
          echo "Checking ssms-backend /api/health..."
          curl --fail --silent --show-error https://ssms-backend.vercel.app/api/health | grep '"status":"ok"'

  deploy:
    needs: [integration_test]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel (ssms-backend)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npx vercel --version
          # Deploy the repository root to the ssms-backend project
          npx vercel --prod --yes --project ssms-backend
